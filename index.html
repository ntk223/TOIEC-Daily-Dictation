<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Listening Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-hover: #f8f9ff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #a5b4fc;
            --primary-bg: #eef2ff;
            --success: #22c55e;
            --success-dark: #16a34a;
            --success-bg: #f0fdf4;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-pill: 50px;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #263348;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --primary-light: #6366f1;
            --primary-bg: rgba(99,102,241,0.15);
            --success: #4ade80;
            --success-dark: #22c55e;
            --success-bg: rgba(34,197,94,0.1);
            --border: #334155;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }

        /* ── HERO HEADER ─────────────────────────────── */
        .hero {
            position: relative;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
            color: white;
            padding: 48px 32px 40px;
            overflow: hidden;
            text-align: center;
        }
        .hero::before {
            content: '';
            position: absolute; inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: drift 20s linear infinite;
        }
        @keyframes drift { to { background-position: 60px 60px; } }

        .hero-content { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
        .hero h1 {
            font-size: 2.4rem; font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.15);
        }
        .hero p {
            font-size: 1.05rem; opacity: 0.9; margin-top: 8px; font-weight: 400;
        }
        .hero-badges {
            display: flex; gap: 12px; justify-content: center;
            margin-top: 20px; flex-wrap: wrap;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.18); backdrop-filter: blur(8px);
            padding: 8px 18px; border-radius: var(--radius-pill);
            font-size: 0.88rem; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .hero-badge .num { font-size: 1.1rem; font-weight: 800; }

        .theme-toggle {
            position: absolute; top: 20px; right: 24px; z-index: 2;
            background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.25);
            color: white; width: 44px; height: 44px; border-radius: 50%;
            cursor: pointer; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px); transition: all 0.3s;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }

        /* ── STATS BAR ────────────────────────────────── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            max-width: 1440px; margin: -30px auto 0; padding: 0 32px;
            position: relative; z-index: 10;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 22px;
            display: flex; align-items: center; gap: 14px;
            box-shadow: var(--shadow-md);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--border);
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .stat-icon {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; flex-shrink: 0;
        }
        .stat-icon.blue   { background: #eef2ff; }
        .stat-icon.purple { background: #f5f3ff; }
        .stat-icon.green  { background: #f0fdf4; }
        .stat-icon.amber  { background: #fffbeb; }
        [data-theme="dark"] .stat-icon.blue   { background: rgba(99,102,241,0.15); }
        [data-theme="dark"] .stat-icon.purple { background: rgba(139,92,246,0.15); }
        [data-theme="dark"] .stat-icon.green  { background: rgba(34,197,94,0.15); }
        [data-theme="dark"] .stat-icon.amber  { background: rgba(245,158,11,0.15); }
        .stat-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.78rem; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-number { font-size: 1.5rem; font-weight: 800; color: var(--text); line-height: 1.2; }

        /* ── CONTROLS ─────────────────────────────────── */
        .toolbar {
            max-width: 1440px; margin: 24px auto 0; padding: 0 32px;
        }
        .toolbar-inner {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 16px;
        }
        .search-row { position: relative; }
        .search-row input {
            width: 100%; padding: 14px 20px 14px 48px;
            border: 2px solid var(--border); border-radius: var(--radius-sm);
            font-size: 0.95rem; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--bg); color: var(--text);
            font-family: inherit;
        }
        .search-row input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
        }
        .search-row input::placeholder { color: var(--text-secondary); }
        .search-icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            font-size: 1.1rem; color: var(--text-secondary); pointer-events: none;
        }

        .filters-row {
            display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
        }
        .filter-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .filter-label {
            font-size: 0.8rem; color: var(--text-secondary); font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px; margin-right: 2px;
        }

        .filter-btn {
            padding: 7px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-pill);
            background: var(--surface); cursor: pointer; font-size: 0.82rem;
            transition: all 0.2s; font-weight: 600; color: var(--text-secondary);
            font-family: inherit;
        }
        .filter-btn:hover  { background: var(--primary-bg); border-color: var(--primary-light); color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .vocab-A2 { border-color: #86efac; color: #16a34a; }
        .vocab-A2.active { background: #22c55e; color: white; border-color: #22c55e; }
        .vocab-B1 { border-color: #93c5fd; color: #2563eb; }
        .vocab-B1.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .vocab-B2 { border-color: #fdba74; color: #ea580c; }
        .vocab-B2.active { background: #f97316; color: white; border-color: #f97316; }
        .vocab-C1 { border-color: #fca5a5; color: #dc2626; }
        .vocab-C1.active { background: #ef4444; color: white; border-color: #ef4444; }

        .sort-select {
            padding: 8px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
            font-size: 0.85rem; outline: none; cursor: pointer;
            background: var(--surface); color: var(--text); font-family: inherit;
        }

        .reset-btn {
            padding: 8px 18px; background: #fef2f2; color: #dc2626;
            border: 1.5px solid #fecaca; border-radius: var(--radius-pill); font-size: 0.82rem;
            cursor: pointer; font-weight: 600; transition: all 0.2s; margin-left: auto;
            font-family: inherit;
        }
        .reset-btn:hover { background: #fee2e2; transform: scale(1.03); }
        [data-theme="dark"] .reset-btn { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); }

        /* ── TOPIC FILTER ─────────────────────────────── */
        .topic-bar {
            max-width: 1440px; margin: 16px auto 0; padding: 0 32px;
        }
        .topic-bar-inner {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
        }
        .topic-filter-label {
            font-size: 0.8rem; color: var(--text-secondary); font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            white-space: nowrap; margin-right: 6px;
        }
        .topic-btn {
            padding: 6px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-pill);
            background: var(--surface);
            cursor: pointer; font-size: 0.8rem; font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 5px;
            font-family: inherit;
        }
        .topic-btn:hover  { background: var(--primary-bg); border-color: var(--primary-light); color: var(--primary); }
        .topic-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .topic-btn-all.active { background: var(--primary-dark); border-color: var(--primary-dark); }

        /* ── PROGRESS ─────────────────────────────────── */
        .progress-section {
            max-width: 1440px; margin: 16px auto 0; padding: 0 32px;
        }
        .progress-inner {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex; align-items: center; gap: 20px;
        }
        .progress-label { font-size: 0.9rem; font-weight: 600; color: var(--text); white-space: nowrap; }
        .progress-bar-wrapper {
            flex: 1; background: var(--bg);
            border-radius: var(--radius-pill); height: 14px; overflow: hidden;
            position: relative;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #4ade80, #86efac);
            background-size: 200% 100%;
            animation: shimmer 2s ease-in-out infinite;
            border-radius: var(--radius-pill);
            transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .progress-text {
            font-size: 0.9rem; font-weight: 700;
            color: var(--success-dark); white-space: nowrap;
        }
        [data-theme="dark"] .progress-text { color: var(--success); }

        .motivation-msg {
            font-size: 0.82rem; color: var(--text-secondary);
            font-style: italic; margin-left: 8px;
        }

        /* ── MAIN CONTENT ─────────────────────────────── */
        .main-content { max-width: 1440px; margin: 24px auto 60px; padding: 0 32px; }

        .loading { text-align: center; padding: 80px; color: var(--text-secondary); font-size: 1.1rem; }
        .loading .spinner {
            width: 48px; height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── CATEGORIES ───────────────────────────────── */
        .category-section {
            margin-bottom: 36px;
            animation: fadeUp 0.5s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .category-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 18px; cursor: pointer; user-select: none;
            padding: 16px 20px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: box-shadow 0.2s;
        }
        .category-header:hover { box-shadow: var(--shadow-md); }
        .category-title { display: flex; align-items: center; gap: 12px; }
        .category-icon {
            font-size: 1.4rem;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            background: var(--primary-bg); border-radius: 12px;
        }
        .category-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        .category-count {
            background: var(--primary-bg); color: var(--primary);
            border-radius: var(--radius-pill);
            padding: 3px 12px; font-size: 0.78rem; font-weight: 700;
        }
        .category-progress { display: flex; align-items: center; gap: 12px; }
        .cat-progress-bar {
            width: 140px; background: var(--bg); border-radius: var(--radius-pill);
            height: 8px; overflow: hidden;
        }
        .cat-progress-fill {
            height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80);
            border-radius: var(--radius-pill); transition: width 0.4s;
        }
        .cat-progress-text { font-size: 0.8rem; color: var(--text-secondary); font-weight: 600; }
        .collapse-icon {
            font-size: 0.9rem; color: var(--text-secondary);
            transition: transform 0.3s; margin-left: 4px;
        }
        .collapse-icon.collapsed { transform: rotate(-90deg); }

        /* ── CARDS ─────────────────────────────────────── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), box-shadow 0.25s;
            border: 1px solid var(--border);
            border-left: 5px solid var(--primary);
            display: flex; flex-direction: column; gap: 12px;
            position: relative;
            overflow: hidden;
            animation: cardIn 0.4s ease both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), #a855f7);
            opacity: 0; transition: opacity 0.3s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .card:hover::before { opacity: 1; }
        .card.completed {
            border-left-color: var(--success);
            background: var(--success-bg);
        }
        .card.completed::before { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .card.hidden { display: none; }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .card-title {
            font-size: 0.95rem; font-weight: 600; color: var(--text);
            line-height: 1.5; flex: 1;
        }
        .card.completed .card-title { color: var(--success-dark); }
        [data-theme="dark"] .card.completed .card-title { color: var(--success); }

        .vocab-badge {
            font-size: 0.7rem; font-weight: 700; padding: 3px 10px;
            border-radius: var(--radius-pill); white-space: nowrap; flex-shrink: 0;
            letter-spacing: 0.5px;
        }
        .badge-A2      { background: #dcfce7; color: #16a34a; border: 1px solid #86efac; }
        .badge-B1      { background: #dbeafe; color: #2563eb; border: 1px solid #93c5fd; }
        .badge-B2      { background: #ffedd5; color: #ea580c; border: 1px solid #fdba74; }
        .badge-C1      { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
        .badge-unknown { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
        [data-theme="dark"] .badge-A2 { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); }
        [data-theme="dark"] .badge-B1 { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); }
        [data-theme="dark"] .badge-B2 { background: rgba(249,115,22,0.15); border-color: rgba(249,115,22,0.3); }
        [data-theme="dark"] .badge-C1 { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); }

        .card-meta { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: var(--text-secondary); }
        .card-type-badge {
            padding: 4px 10px; border-radius: var(--radius-pill);
            font-size: 0.75rem; font-weight: 600;
        }
        .type-conversation { background: #ede9fe; color: #7c3aed; }
        .type-short-talk   { background: #fce7f3; color: #db2777; }
        [data-theme="dark"] .type-conversation { background: rgba(124,58,237,0.15); color: #a78bfa; }
        [data-theme="dark"] .type-short-talk   { background: rgba(219,39,119,0.15); color: #f472b6; }

        .card-actions { display: flex; gap: 8px; margin-top: auto; }
        .btn-practice {
            flex: 1; padding: 10px 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white; border: none; border-radius: var(--radius-sm);
            font-size: 0.85rem; font-weight: 700; cursor: pointer;
            text-decoration: none; text-align: center;
            transition: all 0.25s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(99,102,241,0.3);
        }
        .btn-practice:hover {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            box-shadow: 0 4px 16px rgba(99,102,241,0.4);
            transform: translateY(-1px);
        }
        .card.completed .btn-practice {
            background: linear-gradient(135deg, #16a34a, #22c55e);
            box-shadow: 0 2px 8px rgba(34,197,94,0.3);
        }
        .card.completed .btn-practice:hover {
            box-shadow: 0 4px 16px rgba(34,197,94,0.4);
        }

        .btn-check {
            padding: 10px 14px; background: var(--surface); border: 2px solid var(--border);
            border-radius: var(--radius-sm); cursor: pointer; font-size: 1.1rem;
            transition: all 0.25s; color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
        }
        .btn-check:hover  { border-color: var(--success); color: var(--success); transform: scale(1.08); }
        .btn-check.checked { border-color: var(--success); color: var(--success); background: var(--success-bg); }

        .no-results { text-align: center; padding: 80px; color: var(--text-secondary); font-size: 1rem; }
        .no-results .icon { font-size: 3.5rem; display: block; margin-bottom: 16px; }

        .divider { display: none; }

        /* ── SCROLL-TO-TOP ────────────────────────────── */
        .scroll-top {
            position: fixed; bottom: 28px; right: 28px; z-index: 99;
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--primary); color: white; border: none;
            font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 4px 16px rgba(99,102,241,0.4);
            transition: all 0.3s; opacity: 0; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        .scroll-top.visible { opacity: 1; pointer-events: auto; }
        .scroll-top:hover { transform: translateY(-3px) scale(1.08); }

        /* ── FOOTER ───────────────────────────────────── */
        .site-footer {
            text-align: center;
            padding: 32px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
        .site-footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .site-footer a:hover { text-decoration: underline; }

        /* ── RESPONSIVE ───────────────────────────────── */
        @media (max-width: 768px) {
            .hero { padding: 36px 20px 32px; }
            .hero h1 { font-size: 1.6rem; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); margin-top: -20px; padding: 0 16px; gap: 10px; }
            .stat-card { padding: 14px; }
            .stat-icon { width: 40px; height: 40px; font-size: 1.1rem; }
            .stat-number { font-size: 1.2rem; }
            .toolbar, .topic-bar, .progress-section { padding: 0 16px; }
            .main-content { padding: 0 16px; }
            .search-row input { padding: 12px 16px 12px 44px; }
            .filters-row { gap: 10px; }
            .cards-grid { grid-template-columns: 1fr; }
            .category-header { padding: 12px 16px; }
            .progress-inner { flex-wrap: wrap; }
        }

        @media (max-width: 480px) {
            .stats-bar { grid-template-columns: 1fr 1fr; gap: 8px; }
            .hero-badges { gap: 8px; }
            .hero-badge { font-size: 0.8rem; padding: 6px 12px; }
        }
    </style>
</head>
<body>

<!-- Hero Header -->
<div class="hero">
    <button class="theme-toggle" onclick="toggleTheme()" title="Chuyển đổi sáng/tối" aria-label="Toggle dark mode">🌙</button>
    <div class="hero-content">
        <h1>🎧 TOEIC Listening Practice</h1>
        <p>Luyện nghe TOEIC theo chủ đề — Nâng cao kỹ năng mỗi ngày với Daily Dictation</p>
        <div class="hero-badges">
            <span class="hero-badge">🗂️ <span class="num" id="totalCategories">0</span> Chủ đề</span>
            <span class="hero-badge">🎧 <span class="num" id="totalItems">0</span> Bài học</span>
            <span class="hero-badge">✅ <span class="num" id="completedItems">0</span> Hoàn thành</span>
            <span class="hero-badge">📊 <span class="num" id="visibleItems">0</span> Hiển thị</span>
        </div>
    </div>
</div>

<!-- Stats Cards -->
<div class="stats-bar" id="statsBar" style="display:none;"></div>

<!-- Toolbar -->
<div class="toolbar">
    <div class="toolbar-inner">
        <div class="search-row">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Tìm kiếm theo tiêu đề bài học..." oninput="applyFilters()" />
        </div>
        <div class="filters-row">
            <div class="filter-group">
                <span class="filter-label">Loại</span>
                <button class="filter-btn active" onclick="toggleTypeFilter(this,'all')" data-type="all">Tất cả</button>
                <button class="filter-btn" onclick="toggleTypeFilter(this,'conversation')" data-type="conversation">💬 Conversation</button>
                <button class="filter-btn" onclick="toggleTypeFilter(this,'short-talk')" data-type="short-talk">🎙️ Short Talk</button>
            </div>
            <div class="filter-group">
                <span class="filter-label">Cấp độ</span>
                <button class="filter-btn active" onclick="toggleVocabFilter(this,'all')" data-vocab="all">Tất cả</button>
                <button class="filter-btn vocab-A2" onclick="toggleVocabFilter(this,'A2')" data-vocab="A2">A2</button>
                <button class="filter-btn vocab-B1" onclick="toggleVocabFilter(this,'B1')" data-vocab="B1">B1</button>
                <button class="filter-btn vocab-B2" onclick="toggleVocabFilter(this,'B2')" data-vocab="B2">B2</button>
                <button class="filter-btn vocab-C1" onclick="toggleVocabFilter(this,'C1')" data-vocab="C1">C1</button>
            </div>
            <div class="filter-group">
                <span class="filter-label">Sắp xếp</span>
                <select class="sort-select" id="sortSelect" onchange="applyFilters()">
                    <option value="default">Mặc định</option>
                    <option value="title-asc">Tiêu đề A→Z</option>
                    <option value="title-desc">Tiêu đề Z→A</option>
                    <option value="vocab-asc">Cấp độ thấp→cao</option>
                    <option value="vocab-desc">Cấp độ cao→thấp</option>
                    <option value="completed">Chưa làm trước</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Trạng thái</span>
                <button class="filter-btn active" onclick="toggleDoneFilter(this,'all')" data-done="all">Tất cả</button>
                <button class="filter-btn" onclick="toggleDoneFilter(this,'done')" data-done="done">✅ Đã làm</button>
                <button class="filter-btn" onclick="toggleDoneFilter(this,'undone')" data-done="undone">⭕ Chưa làm</button>
            </div>
            <button class="reset-btn" onclick="resetAll()">🔄 Reset</button>
        </div>
    </div>
</div>

<!-- Topic Filter -->
<div class="topic-bar">
    <div class="topic-bar-inner" id="topicFilter">
        <span class="topic-filter-label">📂 Chủ đề</span>
        <button class="topic-btn topic-btn-all active" id="topicBtnAll" onclick="selectAllTopics()">Tất cả</button>
    </div>
</div>

<!-- Progress -->
<div class="progress-section">
    <div class="progress-inner">
        <span class="progress-label">🏆 Tiến độ</span>
        <div class="progress-bar-wrapper">
            <div class="progress-bar-fill" id="totalProgressBar" style="width:0%"></div>
        </div>
        <span class="progress-text" id="totalProgressText">0 / 0</span>
        <span class="motivation-msg" id="motivationMsg"></span>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div class="loading">
        <div class="spinner"></div>
        Đang tải dữ liệu...
    </div>
</div>

<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0})" aria-label="Scroll to top">↑</button>

<footer class="site-footer">
    <p>🎧 Luyện nghe TOEIC mỗi ngày — Powered by <a href="https://dailydictation.com" target="_blank" rel="noopener noreferrer">Daily Dictation</a></p>
</footer>

<script>
// ── Theme toggle ─────────────────────────────────────────────────────────────
function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('toeic_theme', isDark ? 'light' : 'dark');
    document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
}
(function initTheme() {
    const saved = localStorage.getItem('toeic_theme');
    if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.querySelector('.theme-toggle').textContent = '☀️';
    }
})();

// ── Scroll-to-top ────────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
    document.getElementById('scrollTopBtn').classList.toggle('visible', window.scrollY > 400);
});

// Icon map
const CATEGORY_ICONS = {
    "General Business (L1-5)"        : "💼",
    "Office Issues (L6-10)"          : "🖥️",
    "Personnel (L11-15)"             : "👥",
    "Purchasing (L16-20)"            : "📦",
    "Financing & Budgeting (L21-25)" : "💰",
    "Management Issues (L26-30)"     : "🏗️",
    "Restaurants & Events (L31-35)"  : "🍽️",
    "Travel (L36-40)"                : "✈️",
    "Entertainment (L41-45)"         : "🎭",
    "Health (L46-50)"                : "🏥",
    "Miscellaneous (Cần kiểm tra lại)": "📌"
};

const VOCAB_ORDER = { A2: 1, B1: 2, B2: 3, C1: 4 };

let DATA = {};
let completedSet    = new Set(JSON.parse(localStorage.getItem('toeic_completed') || '[]'));
let activeTypeFilter  = 'all';
let activeVocabFilter = 'all';
let activeDoneFilter  = 'all';
let selectedTopics    = new Set(); // empty = show all

function getTypeFromLink(link) {
    if (link.includes('/conversation-')) return 'conversation';
    if (link.includes('/short-talk-'))   return 'short-talk';
    return 'other';
}

function titleFromLink(link) {
    const match = link.match(/\/toeic\/([\w-]+)\.\d+\/listen/);
    if (!match) return link;
    return match[1].replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
}

function saveCompleted() {
    localStorage.setItem('toeic_completed', JSON.stringify([...completedSet]));
}

function toggleComplete(key, btn, card, practiceBtn) {
    if (completedSet.has(key)) {
        completedSet.delete(key);
        btn.classList.remove('checked');
        btn.textContent = '⭕';
        card.classList.remove('completed');
        practiceBtn.innerHTML = '▶ Luyện nghe';
    } else {
        completedSet.add(key);
        btn.classList.add('checked');
        btn.textContent = '✅';
        card.classList.add('completed');
        practiceBtn.innerHTML = '🔁 Ôn lại';
    }
    saveCompleted();
    updateStats();
}

function toggleTypeFilter(btn, type) {
    document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTypeFilter = type;
    applyFilters();
}

function toggleVocabFilter(btn, vocab) {
    document.querySelectorAll('[data-vocab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeVocabFilter = vocab;
    applyFilters();
}

function toggleDoneFilter(btn, done) {
    document.querySelectorAll('[data-done]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeDoneFilter = done;
    applyFilters();
}

function toggleTopicFilter(btn, catName) {
    if (selectedTopics.has(catName)) {
        selectedTopics.delete(catName);
        btn.classList.remove('active');
    } else {
        selectedTopics.add(catName);
        btn.classList.add('active');
    }
    // If nothing selected, treat as "all"
    document.getElementById('topicBtnAll').classList.toggle('active', selectedTopics.size === 0);
    applyFilters();
}

function selectAllTopics() {
    selectedTopics.clear();
    document.querySelectorAll('.topic-btn:not(.topic-btn-all)').forEach(b => b.classList.remove('active'));
    document.getElementById('topicBtnAll').classList.add('active');
    applyFilters();
}

function resetAll() {
    document.getElementById('searchInput').value = '';
    activeTypeFilter  = 'all';
    activeVocabFilter = 'all';
    activeDoneFilter  = 'all';
    selectedTopics.clear();
    document.querySelectorAll('[data-type]').forEach(b  => b.classList.remove('active'));
    document.querySelectorAll('[data-vocab]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('[data-done]').forEach(b  => b.classList.remove('active'));
    document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-type="all"]').classList.add('active');
    document.querySelector('[data-vocab="all"]').classList.add('active');
    document.querySelector('[data-done="all"]').classList.add('active');
    document.getElementById('topicBtnAll').classList.add('active');
    document.getElementById('sortSelect').value = 'default';
    applyFilters();
}

function applyFilters() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const sort  = document.getElementById('sortSelect').value;
    let visible = 0;

    for (const catName of Object.keys(DATA)) {
        const safeId  = safeID(catName);
        const section = document.getElementById('section-' + safeId);
        const grid    = document.getElementById('grid-'    + safeId);
        if (!section || !grid) continue;

        const cards = Array.from(grid.querySelectorAll('.card'));

        // Skip entire section if topic filter active and this category not selected
        const matchTopic = selectedTopics.size === 0 || selectedTopics.has(catName);
        if (!matchTopic) {
            const cards2 = Array.from(grid.querySelectorAll('.card'));
            cards2.forEach(c => c.classList.add('hidden'));
            section.style.display = 'none';
            continue;
        }

        let filtered = cards.filter(card => {
            const matchSearch = !query || card.dataset.title.includes(query);
            const matchType   = activeTypeFilter  === 'all' || card.dataset.type  === activeTypeFilter;
            const matchVocab  = activeVocabFilter === 'all' || card.dataset.vocab === activeVocabFilter;
            const isDone      = completedSet.has(card.dataset.key) ? 'done' : 'undone';
            const matchDone   = activeDoneFilter  === 'all' || isDone === activeDoneFilter;
            return matchSearch && matchType && matchVocab && matchDone;
        });

        if (sort === 'title-asc')  filtered.sort((a,b) => a.dataset.title.localeCompare(b.dataset.title));
        if (sort === 'title-desc') filtered.sort((a,b) => b.dataset.title.localeCompare(a.dataset.title));
        if (sort === 'vocab-asc')  filtered.sort((a,b) => (VOCAB_ORDER[a.dataset.vocab]||9) - (VOCAB_ORDER[b.dataset.vocab]||9));
        if (sort === 'vocab-desc') filtered.sort((a,b) => (VOCAB_ORDER[b.dataset.vocab]||9) - (VOCAB_ORDER[a.dataset.vocab]||9));
        if (sort === 'completed')  filtered.sort((a,b) => (completedSet.has(a.dataset.key)?1:0) - (completedSet.has(b.dataset.key)?1:0));

        cards.forEach(c => c.classList.add('hidden'));
        filtered.forEach(c => { c.classList.remove('hidden'); grid.appendChild(c); });

        visible += filtered.length;
        const countEl = section.querySelector('.category-count');
        if (countEl) countEl.textContent = filtered.length;
        section.style.display = filtered.length === 0 ? 'none' : '';
    }

    document.getElementById('visibleItems').textContent = visible;
    const nr = document.getElementById('noResults');
    if (nr) nr.style.display = visible === 0 ? 'block' : 'none';
}

function updateStats() {
    let total = 0;
    for (const cat of Object.values(DATA)) total += cat.items.length;
    const done = completedSet.size;

    document.getElementById('totalItems').textContent     = total;
    document.getElementById('completedItems').textContent = done;
    applyFilters();

    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('totalProgressBar').style.width  = pct + '%';
    document.getElementById('totalProgressText').textContent = `${done} / ${total} (${pct}%)`;

    // Motivational message
    const msgEl = document.getElementById('motivationMsg');
    if (msgEl) {
        if (pct === 0) msgEl.textContent = 'Hãy bắt đầu hành trình chinh phục TOEIC! 🚀';
        else if (pct < 25) msgEl.textContent = 'Khởi đầu tốt lắm! Tiếp tục nào! 💪';
        else if (pct < 50) msgEl.textContent = 'Đã đi được một phần tư chặng đường! 🔥';
        else if (pct < 75) msgEl.textContent = 'Quá nửa rồi, tuyệt vời! 🌟';
        else if (pct < 100) msgEl.textContent = 'Sắp hoàn thành, cố lên! 🎯';
        else msgEl.textContent = 'Hoàn thành xuất sắc! Bạn thật giỏi! 🏆';
    }

    for (const [catName, catData] of Object.entries(DATA)) {
        const sid  = safeID(catName);
        const fill = document.getElementById('catFill-' + sid);
        const text = document.getElementById('catText-' + sid);
        if (!fill || !text) continue;
        const cTotal = catData.items.length;
        const cDone  = catData.items.filter(i => completedSet.has(i.link)).length;
        fill.style.width  = cTotal ? Math.round(cDone / cTotal * 100) + '%' : '0%';
        text.textContent  = `${cDone}/${cTotal}`;
    }
}

function toggleSection(catName) {
    const safeId   = safeID(catName);
    const grid     = document.getElementById('grid-' + safeId);
    const icon     = document.getElementById('collapseIcon-' + safeId);
    const isHidden = grid.style.display === 'none';
    grid.style.display = isHidden ? 'grid' : 'none';
    icon.classList.toggle('collapsed', !isHidden);
}

function safeID(name) {
    return name.replace(/[\s()]/g, '-').replace(/[&/]/g, '').replace(/-+/g, '-');
}

function buildCard(item) {
    const type        = getTypeFromLink(item.link);
    const isCompleted = completedSet.has(item.link);
    const vocab       = item.vocab || 'unknown';
    const title       = item.title || titleFromLink(item.link);

    const card = document.createElement('div');
    card.className     = 'card' + (isCompleted ? ' completed' : '');
    card.dataset.title = title.toLowerCase();
    card.dataset.type  = type;
    card.dataset.vocab = vocab;
    card.dataset.key   = item.link;

    const titleEl = document.createElement('span');
    titleEl.className = 'card-title';
    titleEl.textContent = title;

    const badgeEl = document.createElement('span');
    badgeEl.className = 'vocab-badge badge-' + vocab;
    badgeEl.textContent = vocab;

    const topDiv = document.createElement('div');
    topDiv.className = 'card-top';
    topDiv.appendChild(titleEl);
    topDiv.appendChild(badgeEl);

    const typeBadge = document.createElement('span');
    typeBadge.className = 'card-type-badge ' + (type === 'conversation' ? 'type-conversation' : 'type-short-talk');
    typeBadge.textContent = type === 'conversation' ? '💬 Conversation' : '🎙️ Short Talk';

    const metaDiv = document.createElement('div');
    metaDiv.className = 'card-meta';
    metaDiv.appendChild(typeBadge);

    const practiceBtn = document.createElement('a');
    practiceBtn.className = 'btn-practice';
    practiceBtn.href = item.link;
    practiceBtn.target = '_blank';
    practiceBtn.rel = 'noopener noreferrer';
    practiceBtn.innerHTML = isCompleted ? '🔁 Ôn lại' : '▶ Luyện nghe';

    const checkBtn = document.createElement('button');
    checkBtn.className = 'btn-check' + (isCompleted ? ' checked' : '');
    checkBtn.title = 'Đánh dấu hoàn thành';
    checkBtn.textContent = isCompleted ? '✅' : '⭕';

    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'card-actions';
    actionsDiv.appendChild(practiceBtn);
    actionsDiv.appendChild(checkBtn);

    card.appendChild(topDiv);
    card.appendChild(metaDiv);
    card.appendChild(actionsDiv);

    checkBtn.addEventListener('click', () => toggleComplete(item.link, checkBtn, card, practiceBtn));
    return card;
}

function buildUI() {
    const main = document.getElementById('mainContent');
    main.innerHTML = '';
    let totalItems = 0;
    let sectionIdx = 0;

    for (const [catName, catData] of Object.entries(DATA)) {
        if (!catData.items || catData.items.length === 0) continue;

        const safeId = safeID(catName);
        totalItems  += catData.items.length;
        sectionIdx++;

        const section = document.createElement('div');
        section.className = 'category-section';
        section.id        = 'section-' + safeId;
        section.style.animationDelay = (sectionIdx * 0.08) + 's';

        const header = document.createElement('div');
        header.className = 'category-header';
        header.addEventListener('click', () => toggleSection(catName));

        // Build header safely
        const titleDiv = document.createElement('div');
        titleDiv.className = 'category-title';

        const iconSpan = document.createElement('span');
        iconSpan.className = 'category-icon';
        iconSpan.textContent = catData.icon;

        const nameSpan = document.createElement('span');
        nameSpan.className = 'category-name';
        nameSpan.textContent = catName;

        const countSpan = document.createElement('span');
        countSpan.className = 'category-count';
        countSpan.id = 'count-' + safeId;
        countSpan.textContent = catData.items.length;

        titleDiv.appendChild(iconSpan);
        titleDiv.appendChild(nameSpan);
        titleDiv.appendChild(countSpan);

        const progressDiv = document.createElement('div');
        progressDiv.className = 'category-progress';
        progressDiv.innerHTML = `
            <div class="cat-progress-bar">
                <div class="cat-progress-fill" id="catFill-${safeId}" style="width:0%"></div>
            </div>
            <span class="cat-progress-text" id="catText-${safeId}">0/${catData.items.length}</span>
            <span class="collapse-icon" id="collapseIcon-${safeId}">▼</span>
        `;

        header.appendChild(titleDiv);
        header.appendChild(progressDiv);
        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className       = 'cards-grid';
        grid.id              = 'grid-' + safeId;
        grid.style.marginTop = '14px';

        catData.items.forEach((item, i) => {
            const card = buildCard(item);
            card.style.animationDelay = (i * 0.03) + 's';
            grid.appendChild(card);
        });

        section.appendChild(grid);
        main.appendChild(section);
    }

    const noResults = document.createElement('div');
    noResults.id            = 'noResults';
    noResults.className     = 'no-results';
    noResults.style.display = 'none';
    noResults.innerHTML     = '<span class="icon">🔍</span>Không tìm thấy bài học phù hợp.';
    main.appendChild(noResults);

    const nonEmptyCats = Object.values(DATA).filter(c => c.items && c.items.length > 0).length;
    document.getElementById('totalCategories').textContent = nonEmptyCats;
    document.getElementById('totalItems').textContent      = totalItems;
    document.getElementById('visibleItems').textContent    = totalItems;

    // Build topic filter buttons
    const container = document.getElementById('topicFilter');
    container.querySelectorAll('.topic-btn:not(.topic-btn-all)').forEach(b => b.remove());
    for (const [catName, catData] of Object.entries(DATA)) {
        if (!catData.items || catData.items.length === 0) continue;
        const btn = document.createElement('button');
        btn.className   = 'topic-btn';
        btn.textContent = catData.icon + ' ' + catName;
        btn.title       = catData.items.length + ' bài';
        btn.addEventListener('click', () => toggleTopicFilter(btn, catName));
        container.appendChild(btn);
    }

    updateStats();
}

// ── Fetch từ toeic_classified.json ───────────────────────────────────────────
fetch('toeic_classified.json')
    .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
    })
    .then(json => {
        for (const [catName, items] of Object.entries(json)) {
            DATA[catName] = {
                icon : CATEGORY_ICONS[catName] || '📌',
                items: items
            };
        }
        buildUI();
    })
    .catch(err => {
        document.getElementById('mainContent').innerHTML =
            `<div style="color:red;padding:40px;text-align:center">
                ❌ Không thể tải <code>toeic_classified.json</code><br>
                <small>${err}</small><br><br>
                <small>Mở file qua web server: <code>python -m http.server 8080</code></small>
             </div>`;
    });
</script>
